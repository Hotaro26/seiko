name: tube_fetch_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  change_app_package_name: ^1.5.0
  device_info_plus: ^13.1.0
  dynamic_color: ^1.8.1
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  font_awesome_flutter: ^11.0.0
  http: ^1.6.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
