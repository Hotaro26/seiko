dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/silly_cat.jpg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/silly_cat.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/
